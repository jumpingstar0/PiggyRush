<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7cc957">
  <title>PiggyRush</title>
  <style>
    :root {
      color-scheme: light;
      font-family: ui-rounded, "SF Pro Rounded", "Trebuchet MS", Arial, sans-serif;
      background: #7cc957;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #7cc957;
      touch-action: none;
      overscroll-behavior: none;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #7cc957;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #setupScreen {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      background: rgba(39, 48, 32, 0.52);
      color: #2e2418;
      touch-action: manipulation;
    }

    #setupScreen.is-hidden {
      display: none;
    }

    .setup-panel {
      width: min(980px, 100%);
      max-height: calc(100vh - 28px);
      overflow: auto;
      padding: 18px;
      border: 4px solid #8b643a;
      border-radius: 8px;
      background: #fff8da;
      box-shadow: 0 18px 54px rgba(33, 30, 18, 0.28);
    }

    .setup-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .setup-title {
      margin: 0;
      color: #573b22;
      font-size: 38px;
      line-height: 0.95;
    }

    .setup-subtitle {
      margin: 6px 0 0;
      color: #536334;
      font-size: 15px;
      font-weight: 800;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .setup-section {
      display: grid;
      gap: 8px;
    }

    .setup-section.wide {
      grid-column: 1 / -1;
    }

    .section-label {
      color: #624623;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .choice-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .choice-card {
      min-height: 82px;
      padding: 10px;
      border: 2px solid #c1a16b;
      border-radius: 8px;
      background: #ffeeb2;
      color: #302516;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .choice-card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 16px;
      line-height: 1.05;
    }

    .choice-card span {
      display: block;
      color: #604b2c;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
    }

    .choice-card.is-selected {
      border-color: #2d7f44;
      background: #d9ffc2;
      box-shadow: inset 0 0 0 2px #2d7f44;
    }

    .choice-card.is-disabled {
      opacity: 0.42;
    }

    .setup-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .start-button {
      min-width: 168px;
      min-height: 56px;
      border: 3px solid #fff8dc;
      border-radius: 8px;
      background: #2d7f44;
      color: #fff8dc;
      font: inherit;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }

    #rotateHint {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      color: #18351f;
      background: rgba(255, 242, 193, 0.9);
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.25;
      pointer-events: none;
    }

    @media (max-width: 760px), (max-height: 540px) {
      .setup-panel {
        padding: 12px;
      }

      .setup-title {
        font-size: 30px;
      }

      .setup-grid {
        gap: 10px;
      }

      .choice-card {
        min-height: 70px;
        padding: 8px;
      }

      .choice-card strong {
        font-size: 14px;
      }

      .choice-card span {
        font-size: 12px;
      }
    }

    @media (orientation: portrait) and (max-width: 900px) {
      #rotateHint {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="game" aria-label="PiggyRush two player tower defense game"></div>
  <div id="setupScreen" aria-label="PiggyRush setup screen"></div>
  <div id="rotateHint">Rotate the iPad to landscape. Each player holds one short edge.</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
